<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Somave</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --red: #C82214;
  --red-soft: #FBF0EF;
  --bg: #F9F7F4;
  --text: #1C1008;
  --muted: #9A8C80;
  --border: #E4DDD5;
  --white: #FFFFFF;
  --green: #2E7D4F;
  --green-soft: #EBF5EE;
}
html, body {
  height: 100dvh; width: 100%;
  font-family: 'Sora', sans-serif;
  background: var(--bg);
  overflow: hidden;
  color: var(--text);
}
.screen {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100dvh;
  padding: 5vh 7vw;
  text-align: center;
}
.screen.active { display: flex; }

/* WELCOME */
.w-logo { width: min(260px, 55vw); margin-bottom: 6vh; }
.w-logo img { width: 100%; display: block; }
.w-title {
  font-size: clamp(28px, 5.5vw, 46px);
  font-weight: 700;
  line-height: 1.15;
  letter-spacing: -1px;
  margin-bottom: 2.5vh;
}
.w-sub {
  font-size: clamp(16px, 3vw, 21px);
  font-weight: 300;
  color: var(--muted);
  line-height: 1.5;
  margin-bottom: 5vh;
}
.btn-start {
  background: var(--red);
  color: white;
  border: none;
  font-family: 'Sora', sans-serif;
  font-size: clamp(18px, 3.5vw, 24px);
  font-weight: 600;
  padding: 20px 56px;
  border-radius: 999px;
  cursor: pointer;
  touch-action: manipulation;
  transition: background .2s, transform .15s;
  display: inline-block;
}
.btn-start:active { transform: scale(.97); }
.time-note {
  margin-top: 2vh;
  font-size: clamp(13px, 2vw, 15px);
  color: var(--muted);
  font-weight: 300;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
}

/* QUESTION */
#s-q { justify-content: flex-start; text-align: left; }
.q-header {
  width: 100%; display: flex;
  align-items: center; justify-content: space-between;
  flex-shrink: 0; margin-bottom: 3vh;
}
.q-label {
  font-size: clamp(11px, 1.8vw, 13px);
  font-weight: 600; letter-spacing: 2.5px;
  text-transform: uppercase; color: var(--muted);
}
.q-dots { display: flex; gap: 7px; }
.q-dot {
  width: 9px; height: 9px; border-radius: 50%;
  background: var(--border); transition: background .3s, transform .3s;
}
.q-dot.active { background: var(--red); transform: scale(1.3); }
.q-dot.done { background: var(--red); opacity: .35; }
.q-text {
  font-size: clamp(20px, 4vw, 34px); font-weight: 600;
  line-height: 1.2; width: 100%; flex-shrink: 0; margin-bottom: 1vh;
}
.q-hint {
  font-size: clamp(13px, 2vw, 15px); font-weight: 300;
  color: var(--muted); width: 100%; flex-shrink: 0; margin-bottom: 3vh;
}
.opts {
  width: 100%; flex: 1; display: flex;
  flex-direction: column; gap: 1.8vh;
  overflow: hidden; min-height: 0;
}
.opts.grid2 {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 1.8vh 2vw; align-content: stretch;
}
.opt {
  flex: 1; background: var(--white);
  border: 2px solid var(--border); border-radius: 16px;
  padding: 0 5vw; cursor: pointer;
  display: flex; align-items: center; gap: 4vw;
  font-size: clamp(15px, 2.6vw, 20px); font-weight: 400;
  color: var(--text); text-align: left;
  transition: border-color .15s, background .15s, transform .1s;
  touch-action: manipulation; user-select: none; -webkit-user-select: none;
  min-height: 0;
}
.opts.grid2 .opt { padding: 0 3vw; gap: 2vw; }
.opt:active { transform: scale(.985); }
.opt.sel { border-color: var(--red); background: var(--red-soft); font-weight: 600; color: var(--red); }
.mark {
  width: clamp(20px, 3vw, 24px); height: clamp(20px, 3vw, 24px);
  border-radius: 50%; border: 2px solid var(--border);
  flex-shrink: 0; position: relative; transition: all .15s;
}
.mark.sq { border-radius: 7px; }
.opt.sel .mark { border-color: var(--red); background: var(--red); }
.opt.sel .mark.rd::after {
  content: ''; position: absolute; top: 50%; left: 50%;
  width: 38%; height: 38%; background: white;
  border-radius: 50%; transform: translate(-50%, -50%);
}
.opt.sel .mark.sq::after {
  content: ''; position: absolute; top: 50%; left: 50%;
  width: 46%; height: 32%; background: none;
  border-bottom: 2px solid white; border-left: 2px solid white;
  transform: translate(-50%, -65%) rotate(-45deg);
}
.nav {
  width: 100%; display: flex; align-items: center;
  justify-content: space-between; flex-shrink: 0; padding-top: 3vh;
}
.btn-back {
  background: transparent; border: 2px solid var(--border);
  color: var(--muted); font-family: 'Sora', sans-serif;
  font-size: clamp(14px, 2.2vw, 17px); font-weight: 400;
  padding: 1.8vh 5vw; border-radius: 999px;
  cursor: pointer; touch-action: manipulation; visibility: hidden;
}
.btn-back.show { visibility: visible; }
.btn-next {
  background: var(--red); color: white; border: none;
  font-family: 'Sora', sans-serif;
  font-size: clamp(15px, 2.5vw, 19px); font-weight: 600;
  padding: 1.8vh 7vw; border-radius: 999px; cursor: pointer;
  transition: opacity .2s, transform .1s;
  opacity: .2; pointer-events: none; touch-action: manipulation;
}
.btn-next.on { opacity: 1; pointer-events: all; }
.btn-next.on:active { transform: scale(.97); }

/* THANKS */
.ty-icon {
  width: min(90px, 20vw); height: min(90px, 20vw);
  background: var(--green-soft); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 4vh;
}
.ty-title {
  font-size: clamp(34px, 6.5vw, 52px); font-weight: 700;
  letter-spacing: -1.5px; margin-bottom: 1.5vh;
}
.ty-sub {
  font-size: clamp(15px, 2.8vw, 20px); font-weight: 300;
  color: var(--muted); line-height: 1.5; margin-bottom: 5vh;
}
.btn-nova {
  background: transparent; border: 2px solid var(--border);
  color: var(--muted); font-family: 'Sora', sans-serif;
  font-size: clamp(15px, 2.5vw, 19px); font-weight: 400;
  padding: 1.8vh 7vw; border-radius: 999px;
  cursor: pointer; touch-action: manipulation;
}
.countdown {
  margin-top: 2vh; font-size: clamp(12px, 1.8vw, 14px);
  color: var(--muted); font-weight: 300; min-height: 1.4em;
}
</style>
</head>

  <h1 class="w-title">Você conhece<br>a Somave?</h1>
  <p class="w-sub">Participe e ganhe uma chance<br>na máquina de pelúcia!</p>
  <button class="btn-start" onclick="start()">Começar</button>
  <div class="time-note">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
    Menos de 1 minuto
  </div>
</div>

<div class="screen" id="s-q">
  <div class="q-header">
    <span class="q-label" id="q-label">PERGUNTA 1 DE 6</span>
    <div class="q-dots" id="q-dots"></div>
  </div>
  <div class="q-text" id="q-text"></div>
  <div class="q-hint" id="q-hint"></div>
  <div class="opts" id="q-opts"></div>
  <div class="nav">
    <button class="btn-back" id="btn-back" onclick="prev()">&#8592; Voltar</button>
    <button class="btn-next" id="btn-next" onclick="next()">Próxima &#8594;</button>
  </div>
</div>

<div class="screen" id="s-thanks">
  <div class="ty-icon">
    <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#2E7D4F" stroke-width="2.2"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
  </div>
  <h2 class="ty-title">Obrigado!</h2>
  <p class="ty-sub">Sua participação é muito<br>valiosa para nós.</p>
  <button class="btn-nova" onclick="nova()">Nova pesquisa</button>
  <div class="countdown" id="countdown"></div>
</div>

<script>
var SHEETS_URL = 'https://script.google.com/macros/s/AKfycbxV5GY0uXLCfjfG5qwoyEJugklPHTwJDtQjWbK8SNGkpUGps0CxnLOmMvYdYEZAdck/exec';

var QS = [
  {id:'q1', text:'O que você faz?', hint:'Escolha uma opção', multi:false,
   opts:['Supermercadista','Distribuidor','Comprador','Consumidor final','Representante','Outro']},
  {id:'q2', text:'Você conhece a marca Somave?', hint:'Escolha uma opção', multi:false,
   opts:['Sim, conheço bem','Já ouvi falar','Não, nunca ouvi falar']},
  {id:'q3', text:'Onde viu ou ouviu falar da Somave?', hint:'Escolha uma opção', multi:false,
   opts:['Supermercado','Feiras / Eventos','Redes Sociais','Representante comercial','Nunca ouvi','Outro']},
  {id:'q4', text:'O que a Somave produz?', hint:'Escolha uma opção', multi:false,
   opts:['Frango','Galinha','Galo','Frango, Galinha e Galo']},
  {id:'q5', text:'Você compraria produtos da Somave?', hint:'Escolha uma opção', multi:false,
   opts:['Sim','Talvez','Não']},
  {id:'q6', text:'Quais palavras definem a Somave?', hint:'Pode escolher mais de uma', multi:true,
   opts:['Qualidade','Confiança','Tradição','Inovação','Custo-benefício','Nenhum']}
];

var qi = 0, ans = {}, timer = null;

function show(id) {
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
}

function start() { qi = 0; ans = {}; render(); show('s-q'); }

function render() {
  var q = QS[qi], sel = ans[q.id] || [];
  document.getElementById('q-label').textContent = 'PERGUNTA ' + (qi+1) + ' DE ' + QS.length;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('q-hint').textContent = q.hint;

  var dotsEl = document.getElementById('q-dots');
  dotsEl.innerHTML = '';
  QS.forEach(function(_, i) {
    var d = document.createElement('div');
    d.className = 'q-dot' + (i===qi?' active':i<qi?' done':'');
    dotsEl.appendChild(d);
  });

  var grid = document.getElementById('q-opts');
  var useGrid = q.opts.length >= 4 && !q.multi;
  grid.className = 'opts' + (useGrid ? ' grid2' : '');
  grid.innerHTML = '';
  q.opts.forEach(function(o) {
    var btn = document.createElement('button');
    btn.className = 'opt' + (sel.indexOf(o) > -1 ? ' sel' : '');
    var mk = q.multi ? 'sq' : 'rd';
    btn.innerHTML = '<span class="mark ' + mk + '"></span><span>' + o + '</span>';
    btn.addEventListener('click', function(){ pick(q, o, btn); });
    grid.appendChild(btn);
  });

  document.getElementById('btn-back').className = 'btn-back' + (qi > 0 ? ' show' : '');
  updateNext();
}

function pick(q, o, btn) {
  if (!ans[q.id]) ans[q.id] = [];
  if (q.multi) {
    var idx = ans[q.id].indexOf(o);
    if (idx > -1) { ans[q.id].splice(idx, 1); btn.classList.remove('sel'); }
    else { ans[q.id].push(o); btn.classList.add('sel'); }
  } else {
    ans[q.id] = [o];
    document.querySelectorAll('#q-opts .opt').forEach(function(b){ b.classList.remove('sel'); });
    btn.classList.add('sel');
  }
  updateNext();
}

function updateNext() {
  var has = (ans[QS[qi].id] || []).length > 0;
  var nb = document.getElementById('btn-next');
  nb.className = 'btn-next' + (has ? ' on' : '');
  nb.textContent = qi === QS.length - 1 ? 'Enviar ✓' : 'Próxima →';
}

function next() { if (qi < QS.length - 1) { qi++; render(); } else { submit(); } }
function prev() { if (qi > 0) { qi--; render(); } }

function enviarSheets(dados) {
  var url = SHEETS_URL
    + '?ts=' + encodeURIComponent(dados.ts)
    + '&q1=' + encodeURIComponent(dados.q1)
    + '&q2=' + encodeURIComponent(dados.q2)
    + '&q3=' + encodeURIComponent(dados.q3)
    + '&q4=' + encodeURIComponent(dados.q4)
    + '&q5=' + encodeURIComponent(dados.q5)
    + '&q6=' + encodeURIComponent(dados.q6);
  var img = new Image();
  img.src = url;
}

function submit() {
  var e = { ts: new Date().toISOString() };
  QS.forEach(function(q) { e[q.id] = (ans[q.id] || []).join(' | '); });
  enviarSheets(e);
  show('s-thanks');
  startTimer(20);
}

function startTimer(n) {
  clearInterval(timer);
  var el = document.getElementById('countdown');
  el.textContent = 'Reiniciando em ' + n + 's';
  timer = setInterval(function() {
    n--;
    el.textContent = 'Reiniciando em ' + n + 's';
    if (n <= 0) { clearInterval(timer); nova(); }
  }, 1000);
}

function nova() {
  clearInterval(timer);
  document.getElementById('countdown').textContent = '';
  show('s-welcome');
}
</script>
</body>
</html>
